name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Java セットアップ
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter セットアップ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Flutterプロジェクトの土台を生成
        run: flutter create --project-name ferrari_obd --org com.ferrariapp tmp_base

      - name: カスタムファイルを上書き
        run: |
          cp pubspec.yaml tmp_base/pubspec.yaml
          cp -r lib/. tmp_base/lib/
          mkdir -p tmp_base/assets/sounds
          if [ -d assets ]; then
            cp -r assets/. tmp_base/assets/
          fi
          cp android/app/src/main/AndroidManifest.xml tmp_base/android/app/src/main/AndroidManifest.xml
          # Kotlinバージョンを 1.9.24 に更新
          sed -i '/org.jetbrains.kotlin.android/c\    id "org.jetbrains.kotlin.android" version "1.9.24" apply false' tmp_base/android/settings.gradle
          
          # 古いプラグイン向けに Kotlin バージョンを強制指定する buildscript ブロックを先頭に挿入
          cat << 'EOF' > tmp_build_gradle_prefix
          buildscript {
              ext.kotlin_version = '1.9.24'
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          cat tmp_base/android/build.gradle >> tmp_build_gradle_prefix
          mv tmp_build_gradle_prefix tmp_base/android/build.gradle

          # すべてのサブプロジェクトで Build-Tools のバージョンを強制的に 34.0.0 に揃える（AAPT2 エラー回避のため settings.gradle で処理）
          cat << 'EOF' >> tmp_base/android/settings.gradle
          gradle.beforeProject { project ->
              project.afterEvaluate { p ->
                  if (p.hasProperty("android")) {
                      p.android {
                          buildToolsVersion "34.0.0"
                      }
                  }
              }
          }
          EOF

          # Android SDK バージョンを 34 に強制更新（audioplayers の要求を満たし、かつ AAPT2 エラーを防ぐため）
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 34/' tmp_base/android/app/build.gradle
          sed -i 's/compileSdkVersion\s*flutter.compileSdkVersion/compileSdkVersion 34/' tmp_base/android/app/build.gradle
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 34/' tmp_base/android/app/build.gradle
          sed -i 's/targetSdkVersion\s*flutter.targetSdkVersion/targetSdkVersion 34/' tmp_base/android/app/build.gradle

          # 確認用
          cat tmp_base/android/settings.gradle
          cat tmp_base/android/build.gradle
          cat tmp_base/android/app/build.gradle

      - name: ダミー音声ファイルを生成（実機テスト用）
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          cd tmp_base/assets/sounds
          # 本物の音はあとで差し替え。今はサイン波で動作確認用
          ffmpeg -f lavfi -i "sine=frequency=80:duration=10"  -ar 44100 idle.mp3
          ffmpeg -f lavfi -i "sine=frequency=150:duration=10" -ar 44100 low.mp3
          ffmpeg -f lavfi -i "sine=frequency=250:duration=10" -ar 44100 mid.mp3
          ffmpeg -f lavfi -i "sine=frequency=400:duration=10" -ar 44100 high.mp3

      - name: パッケージ取得
        run: cd tmp_base && flutter pub get

      - name: APKビルド
        run: cd tmp_base && flutter build apk --release

      - name: APKをアップロード
        uses: actions/upload-artifact@v4
        with:
          name: ferrari-sound-apk
          path: tmp_base/build/app/outputs/flutter-apk/app-release.apk
